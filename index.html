<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loader</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.loader{
    text-align:center;
}
.spinner{
    width:45px;
    height:45px;
    border:4px solid rgba(255,255,255,.2);
    border-top:4px solid #3b82f6;
    border-radius:50%;
    animation:spin .8s linear infinite;
    margin:0 auto 20px;
}
@keyframes spin{
    to{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="loader">
    <div class="spinner"></div>
    <h2>Loading...</h2>
    <p id="status">Checking loader...</p>
</div>

<script>
fetch("./loader/loader.lua", { cache: "no-store" })
.then(res => {
    if (!res.ok) throw new Error("Loader not found");
    return res.text();
})
.then(code => {
    document.getElementById("status").textContent =
        `Loader loaded (${code.length} bytes)`;
})
.catch(err => {
    document.getElementById("status").textContent = err.message;
});
</script>

</body>
</html>
